<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ホタルイカ身投げ・掬い情報掲示板</title>
  <style>
    :root {
      --primary: #1a6eb5;
      --accent: #00c2e0;
      --bg: #f0f6ff;
      --card-bg: #ffffff;
      --text: #1a1a2e;
      --muted: #6b7a99;
      --tag-bg: #e0f0ff;
      --tag-color: #1a6eb5;
      --border: #d0e4f7;
      --shadow: 0 2px 12px rgba(26,110,181,0.10);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      color: white;
      padding: 18px 16px 14px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    header h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: 0.03em; }
    header h1 span { font-size: 1.5rem; }
    #last-updated { font-size: 0.72rem; opacity: 0.85; margin-top: 4px; }
    #pv-counter { margin-top: 6px; display: flex; justify-content: center; }
    #pv-counter img { height: 18px; border-radius: 4px; }

    /* ===== 予報ウィジェット ===== */
    #forecast-section {
      background: white;
      border-bottom: 1px solid var(--border);
    }
    #forecast-title {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--primary);
      padding: 8px 14px 4px;
    }
    #forecast-scroll {
      display: flex;
      gap: 8px;
      padding: 0 12px 10px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    #forecast-scroll::-webkit-scrollbar { display: none; }
    .fc-card {
      flex-shrink: 0;
      width: 84px;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      padding: 8px 6px;
      text-align: center;
      background: var(--bg);
      position: relative;
      cursor: default;
    }
    .fc-card.score3 { background: #fff3e0; border-color: #ff9800; }
    .fc-card.score2 { background: #e8f5e9; border-color: #66bb6a; }
    .fc-card.today  { box-shadow: 0 0 0 2px var(--primary); }
    .fc-date   { font-size: 0.7rem; color: var(--muted); }
    .fc-day    { font-size: 0.78rem; font-weight: 700; margin-bottom: 2px; }
    .fc-day.sat { color: #1976d2; }
    .fc-day.sun { color: #e53935; }
    .fc-weather { font-size: 1.4rem; line-height: 1.2; }
    .fc-temp   { font-size: 0.68rem; color: #555; margin-top: 1px; }
    .fc-moon   { font-size: 1rem; margin-top: 3px; }
    .fc-tide-type {
      font-size: 0.65rem;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 6px;
      margin-top: 2px;
      display: inline-block;
    }
    .tide-大潮 { background: #fff3e0; color: #e65100; }
    .tide-中潮 { background: #e3f2fd; color: #1565c0; }
    .tide-小潮 { background: #f3e5f5; color: #6a1b9a; }
    .tide-長潮, .tide-若潮 { background: #f5f5f5; color: #555; }
    .fc-tides  { font-size: 0.6rem; color: #444; margin-top: 3px; line-height: 1.5; }
    .fc-tides .hw { color: #e65100; font-weight: 700; }
    .fc-tides .lw { color: #1565c0; }
    .fc-watch-badge {
      position: absolute;
      top: -6px; right: -6px;
      background: #ff9800;
      color: white;
      font-size: 0.6rem;
      font-weight: 700;
      border-radius: 10px;
      padding: 1px 5px;
    }
    #forecast-note {
      font-size: 0.62rem;
      color: var(--muted);
      padding: 0 14px 8px;
    }

    /* ===== フィルター ===== */
    #filter-bar {
      padding: 10px 12px;
      background: white;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    #filter-bar::-webkit-scrollbar { display: none; }
    .filter-btn {
      flex-shrink: 0;
      padding: 5px 14px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: white;
      color: var(--muted);
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .filter-btn.active, .filter-btn:hover {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    /* ===== 記事カード ===== */
    #cards {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 640px;
      margin: 0 auto;
    }
    .card {
      background: var(--card-bg);
      border-radius: 14px;
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 1px solid var(--border);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(26,110,181,0.15); }
    .card-thumb {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
      background: linear-gradient(135deg, #c8e6ff 0%, #e0f7fa 100%);
    }
    .card-thumb-placeholder {
      width: 100%;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.8rem;
      background: linear-gradient(135deg, #c8e6ff 0%, #e0f7fa 100%);
    }
    .card-body { padding: 12px 14px 14px; }
    .card-title {
      font-size: 0.95rem;
      font-weight: 700;
      line-height: 1.45;
      margin-bottom: 6px;
      color: var(--text);
    }
    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .location-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--tag-bg);
      color: var(--tag-color);
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 0.76rem;
      font-weight: 600;
    }
    .card-date { font-size: 0.72rem; color: var(--muted); }
    .card-pub-date {
      font-size: 0.72rem;
      color: #e65100;
      font-weight: 600;
    }
    .card-summary {
      font-size: 0.85rem;
      color: #333;
      line-height: 1.6;
      margin-bottom: 10px;
    }
    .card-link {
      display: inline-block;
      color: var(--primary);
      font-size: 0.82rem;
      font-weight: 600;
      text-decoration: none;
      border: 1.5px solid var(--primary);
      border-radius: 8px;
      padding: 4px 14px;
      transition: all 0.2s;
    }
    .card-link:hover { background: var(--primary); color: white; }
    #empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 1rem;
    }
    #empty .emoji { font-size: 3rem; margin-bottom: 12px; }
    footer {
      text-align: center;
      padding: 24px 16px;
      color: var(--muted);
      font-size: 0.75rem;
    }
  </style>
</head>
<body>

<header>
  <h1><span>🦑</span> ホタルイカ身投げ・掬い情報</h1>
  <div id="last-updated">読み込み中...</div>
  <div id="pv-counter">
    <img src="https://visitor-badge.laobi.icu/badge?page_id=afghani420.hotaruika-watch&left_color=%231a6eb5&right_color=%2300c2e0&left_text=PV%28today%2Fall%29" alt="ページビュー" />
  </div>
</header>

<!-- 天気・潮汐・月齢予報 -->
<div id="forecast-section" style="display:none">
  <div id="forecast-title">📍 滑川市（富山）の天気・潮汐・月齢 — 1週間予報</div>
  <div id="forecast-scroll"></div>
  <div id="forecast-note">※満潮・干潮は伏木港基準の近似値（±1〜2時間の誤差あり）。🟠=観察好条件</div>
</div>

<div id="filter-bar">
  <button class="filter-btn active" data-location="">すべて</button>
</div>

<div id="cards"></div>
<div id="empty" style="display:none">
  <div class="emoji">🦑</div>
  <div>該当する情報がありません</div>
</div>

<footer>自動収集による情報です。最新情報は各リンク先でご確認ください。<br>天気: Open-Meteo / 潮汐: 天文計算（伏木港近似）</footer>

<script>
  let allItems = [];
  let activeLocation = '';

  async function loadData() {
    const [itemsRes, forecastRes] = await Promise.allSettled([
      fetch('data/results.json?t=' + Date.now()).then(r => r.json()),
      fetch('data/forecast.json?t=' + Date.now()).then(r => r.json()),
    ]);

    allItems = itemsRes.status === 'fulfilled' ? itemsRes.value : [];
    const forecast = forecastRes.status === 'fulfilled' ? forecastRes.value : null;

    renderForecast(forecast);
    renderFilterButtons();
    renderCards();
    updateLastUpdated();
  }

  function updateLastUpdated() {
    const el = document.getElementById('last-updated');
    const latest = allItems[0]?.fetched_at || '';
    el.textContent = latest ? `最終更新: ${latest}` : (allItems.length === 0 ? 'データなし' : '');
  }

  // ===== 予報レンダリング =====
  function renderForecast(forecast) {
    if (!forecast || !forecast.days || forecast.days.length === 0) return;
    const section = document.getElementById('forecast-section');
    const scroll  = document.getElementById('forecast-scroll');
    section.style.display = 'block';
    scroll.innerHTML = '';

    const todayStr = new Date().toLocaleDateString('sv-SE'); // YYYY-MM-DD

    forecast.days.forEach(day => {
      const d = new Date(day.date + 'T12:00:00+09:00');
      const isToday = day.date === todayStr;
      const scoreClass = day.watch_score >= 3 ? 'score3' : day.watch_score === 2 ? 'score2' : '';
      const dayClasses = ['fc-day'];
      if (d.getDay() === 0) dayClasses.push('sun');
      else if (d.getDay() === 6) dayClasses.push('sat');

      const tidesHtml = day.tide_times.slice(0, 4).map(t =>
        `<span class="${t.type === '満潮' ? 'hw' : 'lw'}">${t.type === '満潮' ? '▲' : '▽'}${t.time}</span>`
      ).join('<br>');

      const morningBadge = day.morning_hw.length > 0
        ? `<div style="font-size:0.58rem;color:#e65100;font-weight:700;margin-top:2px;">🌊早朝満潮</div>`
        : '';

      const watchBadge = day.watch_score >= 3
        ? `<div class="fc-watch-badge">好条件</div>`
        : '';

      const card = document.createElement('div');
      card.className = `fc-card ${scoreClass} ${isToday ? 'today' : ''}`.trim();
      card.innerHTML = `
        ${watchBadge}
        <div class="fc-date">${day.date.slice(5).replace('-','/')}</div>
        <div class="${dayClasses.join(' ')}">${day.weekday}</div>
        <div class="fc-weather">${day.weather_icon}</div>
        <div class="fc-temp">${day.temp_max ?? '-'}°/<span style="color:#64b5f6">${day.temp_min ?? '-'}°</span></div>
        <div class="fc-moon">${day.moon_icon}</div>
        <span class="fc-tide-type tide-${day.tide_type}">${day.tide_type}</span>
        <div class="fc-tides">${tidesHtml}</div>
        ${morningBadge}
      `;
      scroll.appendChild(card);
    });
  }

  // ===== フィルター =====
  function getLocations() {
    const locs = new Set();
    allItems.forEach(item => { if (item.location) locs.add(item.location); });
    return [...locs].slice(0, 12);
  }

  function renderFilterButtons() {
    const bar = document.getElementById('filter-bar');
    bar.innerHTML = '';
    const allBtn = document.createElement('button');
    allBtn.className = 'filter-btn' + (activeLocation === '' ? ' active' : '');
    allBtn.textContent = 'すべて';
    allBtn.onclick = () => setFilter('');
    bar.appendChild(allBtn);

    getLocations().forEach(loc => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn' + (activeLocation === loc ? ' active' : '');
      btn.textContent = '📍 ' + loc;
      btn.onclick = () => setFilter(loc);
      bar.appendChild(btn);
    });
  }

  function setFilter(loc) {
    activeLocation = loc;
    renderFilterButtons();
    renderCards();
  }

  // ===== 記事カード =====
  function renderCards() {
    const container = document.getElementById('cards');
    const empty = document.getElementById('empty');
    let items = activeLocation
      ? allItems.filter(i => i.location === activeLocation)
      : allItems;

    // published_at がある記事を上に、次いで fetched_at 降順
    items = [...items].sort((a, b) => {
      const pa = a.published_at || '', pb = b.published_at || '';
      if (pa && pb) return pb.localeCompare(pa);
      if (pa) return -1;
      if (pb) return 1;
      return (b.fetched_at || '').localeCompare(a.fetched_at || '');
    });

    container.innerHTML = '';
    if (items.length === 0) { empty.style.display = 'block'; return; }
    empty.style.display = 'none';

    items.forEach(item => {
      const card = document.createElement('div');
      card.className = 'card';

      const thumbHtml = item.thumbnail
        ? `<img class="card-thumb" src="${esc(item.thumbnail)}" alt="" loading="lazy" onerror="this.style.display='none'">`
        : `<div class="card-thumb-placeholder">🦑</div>`;

      const locHtml = item.location
        ? `<span class="location-tag">📍 ${esc(item.location)}</span>`
        : '';

      const dateHtml = item.published_at
        ? `<span class="card-pub-date">📅 ${esc(item.published_at)}</span>`
        : `<span class="card-date">🕐 ${esc(item.fetched_at || '')}</span>`;

      card.innerHTML = `
        ${thumbHtml}
        <div class="card-body">
          <div class="card-title">${esc(item.title)}</div>
          <div class="card-meta">${locHtml}${dateHtml}</div>
          <div class="card-summary">${esc(item.summary)}</div>
          <a class="card-link" href="${esc(item.url)}" target="_blank" rel="noopener">記事を見る →</a>
        </div>
      `;
      container.appendChild(card);
    });
  }

  function esc(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  loadData();
</script>
</body>
</html>
